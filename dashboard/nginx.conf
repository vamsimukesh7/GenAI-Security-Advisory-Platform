# ── Nginx Config — SPA + Reverse Proxy to Advisory API ──

server {
    listen 3000;
    listen [::]:3000;
    server_name _;

    # ── Static dashboard files ──
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets aggressively (hashed filenames from Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Reverse proxy: /internal/stream → SSE (MUST have buffering off) ──
    location = /internal/stream {
        proxy_pass http://advisory-api:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;           # CRITICAL: must be off for SSE to work
        proxy_cache off;
        proxy_read_timeout 3600s;      # Keep SSE connection alive for 1 hour
        chunked_transfer_encoding on;
    }

    # ── Reverse proxy: /internal/* → advisory-api ──
    location /internal/ {
        proxy_pass http://advisory-api:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Reverse proxy: /api/* → advisory-api ──
    location /api/ {
        proxy_pass http://advisory-api:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Reverse proxy: /health → advisory-api ──
    location = /health {
        proxy_pass http://advisory-api:8000;
        proxy_read_timeout 5s;
    }

    # ── Reverse proxy: /login → advisory-api ──
    location = /login {
        proxy_pass http://advisory-api:8000;
        proxy_read_timeout 10s;
    }

    # ── Reverse proxy: /analyze → advisory-api ──
    location = /analyze {
        proxy_pass http://advisory-api:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # ── Nginx health check (for Docker HEALTHCHECK) ──
    location = /health-check {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── SPA fallback: serve index.html for all client-side routes ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
